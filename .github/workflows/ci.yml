name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-self-test:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Build release binary
        run: swift build -c release
      - name: Run media pipeline self-test
        run: .build/release/SnapRecorder --self-test
